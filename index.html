<!DOCTYPE html>
<html>

<head>

<title>Health Monitoring Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
display:inline-block;
width:200px;
font-size:20px;
vertical-align:top;
}

.ecg-card{
width:420px;
height:220px;
}

#ecgChart{
width:100%;
height:150px;
background:white;
border-radius:8px;
}

</style>

</head>

<body>

<h1>SHANMUGHA POLYTECHNIC COLLEGE</h1>
<h2>Health Monitoring Dashboard</h2>

<div class="container">

<div class="card">
Name<br>
<span id="name">--</span>
</div>

<div class="card">
Patient ID<br>
<span id="pid">--</span>
</div>

<div class="card">
Age<br>
<span id="age">--</span>
</div>

<div class="card">
Sex<br>
<span id="sex">--</span>
</div>

<div class="card">
Pulse<br>
<span id="pulse">--</span>
</div>

<div class="card">
SpO2<br>
<span id="spo2">--</span>
</div>

<div class="card">
Temperature<br>
<span id="temp">--</span>
</div>

<div class="card">
Systolic<br>
<span id="sys">--</span>
</div>

<div class="card">
Diastolic<br>
<span id="dia">--</span>
</div>

<div class="card ecg-card">
ECG
<canvas id="ecgChart"></canvas>
</div>

</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_PROJECT.firebaseapp.com",

databaseURL:"YOUR_DATABASE_URL",

projectId:"YOUR_PROJECT_ID",

storageBucket:"YOUR_PROJECT.appspot.com",

messagingSenderId:"",

appId:""

};

firebase.initializeApp(firebaseConfig)

const db = firebase.database()

let patientID="P001"

/* PATIENT INFO */

db.ref("patients/"+patientID+"/info/name").on("value",(snap)=>{
document.getElementById("name").innerHTML=snap.val()
})

db.ref("patients/"+patientID+"/info/id").on("value",(snap)=>{
document.getElementById("pid").innerHTML=snap.val()
})

db.ref("patients/"+patientID+"/info/age").on("value",(snap)=>{
document.getElementById("age").innerHTML=snap.val()
})

db.ref("patients/"+patientID+"/info/sex").on("value",(snap)=>{
document.getElementById("sex").innerHTML=snap.val()
})

/* HEALTH DATA */

db.ref("patients/"+patientID+"/health/pulse").on("value",(snap)=>{
document.getElementById("pulse").innerHTML=snap.val()
})

db.ref("patients/"+patientID+"/health/spo2").on("value",(snap)=>{
document.getElementById("spo2").innerHTML=snap.val()
})

db.ref("patients/"+patientID+"/health/temperature").on("value",(snap)=>{
document.getElementById("temp").innerHTML=snap.val()
})

db.ref("patients/"+patientID+"/health/bp/systolic").on("value",(snap)=>{
document.getElementById("sys").innerHTML=snap.val()
})

db.ref("patients/"+patientID+"/health/bp/diastolic").on("value",(snap)=>{
document.getElementById("dia").innerHTML=snap.val()
})

/* ECG GRAPH */

let ctx=document.getElementById("ecgChart").getContext("2d")

let ecgChart=new Chart(ctx,{

type:"line",

data:{
labels:[],
datasets:[{
data:[],
borderColor:"red",
borderWidth:2,
fill:false,
pointRadius:0
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
animation:false,
plugins:{
legend:{display:false}
},
scales:{
x:{display:false},
y:{display:false}
}
}

})

firebase.database().ref("patients/"+patientID+"/health/ecg_graph").limitToLast(50).on("value",(snap)=>{

let ecg=[]

snap.forEach((child)=>{
ecg.push(child.val())
})

ecgChart.data.labels=ecg.map((v,i)=>i)
ecgChart.data.datasets[0].data=ecg
ecgChart.update()

})

</script>

</body>
</html>
