<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Monitoring Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
background:#1e293b;
padding:20px;
}

h1{margin:5px;}
h2{color:#38bdf8;margin-top:0;}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.value{
font-size:35px;
color:#22c55e;
margin-top:10px;
}

.label{
font-size:18px;
color:#cbd5f5;
}

#ecgCard{grid-column:span 2;}

.hidden{display:none;}

.status{
color:#f87171;
margin-bottom:20px;
}

canvas{
background:#020617;
border-radius:10px;
}

/* PATIENT CARD FONT & SPACING INCREASE */

#patientCard{
font-size:22px;
line-height:2;
padding:35px;
}

#patientCard .label{
font-size:26px;
margin-bottom:15px;
}

#patientCard div{
margin-top:10px;
}

/* LOGIN */

.login{
width:350px;
margin:auto;
margin-top:120px;
background:white;
color:black;
padding:30px;
border-radius:10px;
}

.login input{
width:90%;
padding:10px;
margin:10px;
}

.login button{
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="login">

<h2>Admin Login</h2>

<input type="text" id="adminID" placeholder="Admin ID">
<input type="password" id="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<p id="error" style="color:red"></p>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none">

<header>
<h1>SHANMUGHA POLYTECHNIC COLLEGE</h1>
<h2>DEPARTMENT OF ELECTRICAL AND ELECTRONICS</h2>
<h3>Health Monitoring Dashboard</h3>
</header>

<div class="status" id="status">
Waiting for realtime data...
</div>

<!-- PATIENT INFO CARD -->

<div class="container">

<div class="card" id="patientCard">
<div class="label">Patient Information</div>
<div>Name : <span id="pname">--</span></div>
<div>ID : <span id="pid">--</span></div>
<div>Age : <span id="page">--</span></div>
<div>Sex : <span id="psex">--</span></div>
</div>

</div>

<div class="container">

<div class="card" id="ecgCard">
<div class="label">ECG Graph</div>
<canvas id="ecgChart"></canvas>
</div>

<div class="card" id="pulseCard">
<div class="label">Pulse</div>
<div id="pulse" class="value">--</div>
</div>

<div class="card" id="oxygenCard">
<div class="label">Oxygen</div>
<div id="oxygen" class="value">--</div>
</div>

<div class="card" id="hrCard">
<div class="label">Heart Rate</div>
<div id="hr" class="value">--</div>
</div>

<div class="card" id="bpCard">
<div class="label">Blood Pressure</div>
<div id="bp" class="value">--</div>
</div>

</div>

</div>

<script>

/* ADMIN LOGIN */

const admins={
"24391200@sastra.ac.in":"24391200",
"24303663@sastra.ac.in":"24303663"
}

function login(){

let id=document.getElementById("adminID").value
let pass=document.getElementById("password").value

if(admins[id] && admins[id]==pass){

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"

}
else{
document.getElementById("error").innerHTML="Invalid Login"
}

}

/* FIREBASE */

var firebaseConfig={
  apiKey: "AIzaSyDiz8J1ivsumAqO6iOBPBX_OISNGtlQ38c",
  authDomain: "shanmugha-patient-monitoring.firebaseapp.com",
  databaseURL: "https://shanmugha-patient-monitoring-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "shanmugha-patient-monitoring",
  storageBucket: "shanmugha-patient-monitoring.firebasestorage.app",
  messagingSenderId: "369476144941",
  appId: "1:369476144941:web:fafec0df720227518ecda4"
};

firebase.initializeApp(firebaseConfig);

var database=firebase.database();

let lastUpdate=Date.now();

let ecgData=[];

const ctx=document.getElementById("ecgChart").getContext("2d");

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
data:ecgData,
borderColor:"#22c55e",
borderWidth:2,
pointRadius:0
}]
},
options:{
responsive:true,
animation:false,
plugins:{legend:{display:false}},
scales:{x:{display:false},y:{display:false}}
}
});

function updateECG(value){

ecgData.push(value);

if(ecgData.length>60){
ecgData.shift();
}

chart.data.labels.push("");

if(chart.data.labels.length>60){
chart.data.labels.shift();
}

chart.update();
}

database.ref("/patients/P001").on("value",function(snapshot){

var data=snapshot.val();

if(!data)return;

lastUpdate=Date.now();

document.getElementById("status").innerHTML="Realtime Data Connected";

/* PATIENT INFO */

document.getElementById("pname").innerHTML=data.info.name;
document.getElementById("pid").innerHTML=data.info.id;
document.getElementById("page").innerHTML=data.info.age;
document.getElementById("psex").innerHTML=data.info.sex;

/* HEALTH DATA */

document.getElementById("pulse").innerHTML=data.health.pulse;
document.getElementById("oxygen").innerHTML=data.health.spo2;
document.getElementById("hr").innerHTML=data.health.pulse;

document.getElementById("bp").innerHTML=
data.health.bp.systolic + "/" + data.health.bp.diastolic;

/* ECG */

var ecg=data.health.ecg_graph;

for(var key in ecg){
updateECG(ecg[key]);
}

showCards();

});

function hideCards(){

document.getElementById("pulseCard").classList.add("hidden");
document.getElementById("oxygenCard").classList.add("hidden");
document.getElementById("hrCard").classList.add("hidden");
document.getElementById("bpCard").classList.add("hidden");
document.getElementById("ecgCard").classList.add("hidden");

document.getElementById("status").innerHTML="No realtime data detected";

}

function showCards(){

document.getElementById("pulseCard").classList.remove("hidden");
document.getElementById("oxygenCard").classList.remove("hidden");
document.getElementById("hrCard").classList.remove("hidden");
document.getElementById("bpCard").classList.remove("hidden");
document.getElementById("ecgCard").classList.remove("hidden");

}

setInterval(function(){

if(Date.now()-lastUpdate>8000){
hideCards();
}

},3000);

</script>

</body>
</html>
